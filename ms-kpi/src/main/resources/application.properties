spring.application.name=ms-kpi
server.port=8082

# =============================================
# Configuracion MySQL con Docker
# Ejecutar primero: docker-compose up -d
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3307/ms_kpi_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Actuator
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always